<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oliv AI</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-user-select: none; user-select: none; cursor: default; overflow: hidden;
      }
      .card {
        position: relative;
        margin: 10px; height: calc(100% - 20px);
        background: #fff; border: 1px solid #e5e7eb; border-radius: 16px;
        box-shadow: 0 12px 36px rgba(0,0,0,0.24);
        padding: 18px 18px 16px;
        display: flex; flex-direction: column; justify-content: center; gap: 14px;
      }
      .logo { position: absolute; top: 14px; right: 16px; height: 22px; width: auto; opacity: 0.95; }
      .row { display: flex; align-items: center; gap: 12px; padding-right: 34px; }
      .icon {
        flex: 0 0 auto; width: 38px; height: 38px; border-radius: 999px;
        background: #eff6ff; display: flex; align-items: center; justify-content: center;
      }
      .icon svg { width: 19px; height: 19px; color: #2563eb; }
      .title { font-size: 15px; font-weight: 600; color: #111827; margin: 0; }
      .sub { font-size: 12.5px; color: #6b7280; margin: 2px 0 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .sub b { color: #111827; font-weight: 600; }
      .chk { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: #374151; }
      .chk input { width: 15px; height: 15px; accent-color: #2563eb; margin: 0; }
      .actions { display: flex; justify-content: flex-end; gap: 8px; }
      button {
        border: 0; border-radius: 9px; font-size: 12.5px; font-weight: 600;
        padding: 8px 14px; cursor: pointer; font-family: inherit;
      }
      .secondary { background: transparent; color: #6b7280; }
      .secondary:hover { background: #f3f4f6; }
      .primary { background: #2563eb; color: #fff; }
      .primary:hover { background: #1d4ed8; }
      .danger { background: #ef4444; color: #fff; }
      .danger:hover { background: #dc2626; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="logo-collapsed.png" alt="Oliv AI" />

      <div class="row">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </span>
        <div style="min-width: 0;">
          <p class="title" id="title">Meeting detected</p>
          <p class="sub" id="sub"><b id="app">a meeting app</b></p>
        </div>
      </div>

      <label class="chk" id="sensitiveRow">
        <input type="checkbox" id="sensitive" />
        Sensitive meeting (mic only)
      </label>

      <div class="actions">
        <button class="secondary" id="btnSecondary">Dismiss</button>
        <button class="primary" id="btnPrimary">Start transcription</button>
      </div>
    </div>

    <script src="meeting-prompt.js"></script>
  </body>
</html>
